  <line x1="120" y1="60" x2="480" y2="60" stroke="url(#lineGrad)" stroke-width="1.4"/>
  <line x1="720" y1="60" x2="1080" y2="60" stroke="url(#lineGrad)" stroke-width="1.4"/>

  <text x="600" y="66" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" letter-spacing="3" fill="#8B7CFF" filter="url(#glow)">// BUILT WITH AI · AUTOMATION · CLOUD · DEVOPS · CYBERSEC — 2026</text>
