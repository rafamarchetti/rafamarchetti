<svg width="1600" height="560" viewBox="0 0 1600 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Rafael Marchetti - Head of Technology and Innovation</title>
  <desc id="desc">Dark premium cybernetic banner with restrained graphite, black, silver and subtle teal accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020303"/>
      <stop offset="0.52" stop-color="#07090B"/>
      <stop offset="1" stop-color="#020303"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(800 270) rotate(90) scale(320 700)">
      <stop stop-color="#123A3A" stop-opacity="0.42"/>
      <stop offset="0.46" stop-color="#071011" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#020303" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hairline" x1="180" y1="0" x2="1420" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E5E7EB" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#D9F99D" stop-opacity="0.56"/>
      <stop offset="1" stop-color="#E5E7EB" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#F8FAFC" stroke-opacity="0.035"/>
    </pattern>
    <filter id="titleGlow" x="-20%" y="-80%" width="140%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.64 0 0 0 0 0.86 0 0 0 0 0.78 0 0 0 0.55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1600" height="560" fill="url(#bg)"/>
  <rect width="1600" height="560" fill="url(#halo)"/>
  <rect width="1600" height="560" fill="url(#grid)"/>

  <g opacity="0.34" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="16" fill="#94A3B8">
    <text x="96" y="110">01 52 46 4D 20 2F 2F 20 49 4E 4E 4F 56 41 54 49 4F 4E</text>
    <text x="1090" y="142">root@platform:~$ harden --ship</text>
    <text x="128" y="444">agent.pipeline({ ai, cloud, devops, security, automation })</text>
    <text x="1030" y="462">signal: quiet / precise / resilient</text>
  </g>

  <g opacity="0.45">
    <path d="M250 188L380 120L492 188" stroke="#475569"/>
    <path d="M1106 176L1226 116L1360 178" stroke="#475569"/>
    <circle cx="250" cy="188" r="4" fill="#A7F3D0"/>
    <circle cx="380" cy="120" r="4" fill="#D9F99D"/>
    <circle cx="492" cy="188" r="4" fill="#64748B"/>
    <circle cx="1106" cy="176" r="4" fill="#64748B"/>
    <circle cx="1226" cy="116" r="4" fill="#A7F3D0"/>
    <circle cx="1360" cy="178" r="4" fill="#D9F99D"/>
  </g>

  <rect x="72.5" y="64.5" width="1455" height="431" stroke="#E5E7EB" stroke-opacity="0.1"/>
  <path d="M72 64H222M72 64V214M1528 64H1378M1528 64V214M72 496H222M72 496V346M1528 496H1378M1528 496V346" stroke="#E5E7EB" stroke-opacity="0.38" stroke-width="2"/>
  <path d="M238 280H1362" stroke="url(#hairline)" stroke-width="2"/>

  <text x="800" y="158" text-anchor="middle" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="17" font-weight="700" fill="#A7F3D0" fill-opacity="0.82" letter-spacing="5">SYSTEM PROFILE</text>
  <text x="800" y="258" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="92" font-weight="850" fill="#F8FAFC" filter="url(#titleGlow)">RAFAEL MARCHETTI</text>
  <text x="800" y="328" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="650" fill="#CBD5E1" letter-spacing="2">HEAD OF TECHNOLOGY &amp; INNOVATION</text>
  <text x="800" y="382" text-anchor="middle" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="17" font-weight="700" fill="#94A3B8" letter-spacing="4">AI / AUTOMATION / WEB / INTEGRATIONS</text>

  <g transform="translate(548 424)">
    <rect width="504" height="42" fill="#050607" stroke="#1F2937"/>
    <rect width="6" height="42" fill="#A7F3D0" fill-opacity="0.85"/>
    <text x="30" y="27" font-family="Consolas, Monaco, 'Courier New', monospace" font-size="15" font-weight="700" fill="#E5E7EB">technology, automation and applied AI for real solutions</text>
  </g>
</svg>
