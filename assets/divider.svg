      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="15%" stop-color="#6C63FF" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="1"/>
      <stop offset="85%" stop-color="#2563EB" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-200%" width="220%" height="600%">
