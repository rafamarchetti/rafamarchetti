      <stop offset="0.5" stop-color="#A7F3D0" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#A7F3D0" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
