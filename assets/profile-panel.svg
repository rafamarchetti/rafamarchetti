  <text x="128" y="430" class="sans muted">Head of Technology &amp; Innovation, com foco em IA, APIs, WordPress,</text>
  <text x="128" y="466" class="sans muted">Docker e automa&#231;&#245;es. P&#243;s-graduando em DevOps &amp; Cloud Platform</text>
  <text x="128" y="502" class="sans muted">Engineering com Intelig&#234;ncia Artificial pela PUC Minas.</text>

