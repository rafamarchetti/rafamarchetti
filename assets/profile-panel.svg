  <rect x="70.5" y="58.5" width="1459" height="783" stroke="#E5E7EB" stroke-opacity="0.1"/>
  <path d="M164 132H1436" stroke="url(#edge)" stroke-width="2"/>
  <path d="M164 768H1436" stroke="url(#edge)" stroke-width="2"/>

