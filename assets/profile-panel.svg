<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">About Rafael Marchetti</title>
  <desc id="desc">Dark premium profile panel with clear two-column information hierarchy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020303"/>
      <stop offset="0.52" stop-color="#080A0C"/>
      <stop offset="1" stop-color="#020303"/>
    </linearGradient>
    <linearGradient id="edge" x1="120" y1="0" x2="1480" y2="0" gradientUnits="userSpaceOnUse">
